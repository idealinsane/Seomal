<html data-theme="light">
<head>
    <title>Seomal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-80887304-4"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'UA-80887304-4');
    </script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['"Open Sans Condensed"', 'sans-serif'] } } }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300" rel="stylesheet">
    <script src="https://cdn.polyfill.io/v2/polyfill.min.js?features=Promise,fetch"></script>
    <script src="./cytoscape.3.13.0.min.js"></script>
    <script src="./cytoscape-cose-bilkent.4.0.0.js"></script>
    <script src="lib/TinyColor-1.0.0/tinycolor.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/main.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="overflow-hidden">

<div class="flex h-screen overflow-hidden" x-data="appState()">

    <!-- ── 사이드바 (기본 열림, 슬라이드 푸시) ──────────────────────────── -->
    <aside class="w-60 bg-base-100 border-r border-base-200 flex flex-col shrink-0 overflow-hidden transition-[margin] duration-300 ease-in-out"
           :class="sidebarOpen ? 'ml-0' : '-ml-60'">

        <!-- 헤더 -->
        <div class="flex items-center justify-between px-4 py-3 border-b border-base-200 shrink-0">
            <span class="font-bold text-base">Seomal</span>
            <!-- < 닫기 버튼 -->
            <button class="btn btn-ghost btn-xs btn-square" @click="sidebarOpen = false" title="사이드바 닫기">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
        </div>

        <!-- 그래프 목록 -->
        <ul class="menu flex-1 overflow-y-auto p-2 gap-0.5">
            <template x-for="graph in graphs" :key="graph.id">
                <li class="group">
                    <a class="justify-between pr-1"
                       :class="{'active': graph.id === currentGraphId}"
                       @click="switchGraph(graph.id)">
                        <span class="truncate text-sm" x-text="graph.name"></span>
                        <button class="btn btn-ghost btn-xs btn-square shrink-0 opacity-0 group-hover:opacity-50 hover:!opacity-100"
                                @click.stop="deleteGraph(graph.id)">×</button>
                    </a>
                </li>
            </template>
            <li x-show="graphs.length === 0">
                <span class="text-xs text-base-content/40 cursor-default hover:bg-transparent">그래프가 없습니다.</span>
            </li>
        </ul>

        <!-- 새 그래프 -->
        <div class="p-3 border-t border-base-200 shrink-0">
            <div x-show="!showNewGraphInput">
                <button class="btn btn-ghost btn-sm w-full justify-start gap-2" @click="showNewGraph()">
                    <span class="text-base leading-none font-light">+</span> 새 그래프
                </button>
            </div>
            <div class="flex gap-1.5" x-show="showNewGraphInput">
                <input type="text" class="input input-bordered input-xs flex-1"
                       placeholder="그래프 이름"
                       x-model="newGraphName"
                       x-ref="newGraphInput"
                       @keyup.enter="createGraph()"
                       @keyup.escape="cancelNewGraph()">
                <button class="btn btn-neutral btn-xs" @click="createGraph()">추가</button>
            </div>
        </div>

        <!-- 잠금 토글 -->
        <div class="px-4 py-3 border-t border-base-200 flex items-center gap-3 shrink-0">
            <input type="checkbox" class="toggle toggle-sm toggle-neutral" x-model="isEditMode">
            <div class="flex items-center gap-1.5">
                <!-- 잠금 아이콘 (잠금 상태) -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" x-show="!isEditMode">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <!-- 잠금 해제 아이콘 -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" x-show="isEditMode">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
                </svg>
                <span class="text-sm font-medium" x-text="isEditMode ? '잠금 해제' : '잠금'"></span>
            </div>
        </div>
    </aside>

    <!-- ── 메인 콘텐츠 ──────────────────────────────────────────────────── -->
    <div class="flex flex-col flex-1 min-w-0 overflow-hidden">

        <!-- 네비바 -->
        <div class="navbar bg-base-100 border-b border-base-200 min-h-12 h-12 px-3 shrink-0 gap-2">
            <!-- 사이드바 토글 버튼 -->
            <button class="btn btn-ghost btn-sm btn-square" @click="sidebarOpen = !sidebarOpen" title="사이드바 토글">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <span class="font-bold text-sm truncate max-w-xs" x-text="currentGraphName || 'Seomal'"></span>
            <div class="flex-1"></div>
            <!-- 검색 -->
            <div class="relative" @click.outside="searchResults = []">
                <input type="text"
                       class="input input-bordered input-xs rounded-full w-44 focus:outline-none focus:border-neutral"
                       placeholder="노드 검색..."
                       autocomplete="off"
                       x-model="searchQuery"
                       @keyup="handleSearch()">
                <div class="absolute right-0 top-8 w-64 bg-base-100 rounded-xl shadow-lg border border-base-200 max-h-52 overflow-y-auto z-50"
                     x-show="searchResults.length > 0">
                    <template x-for="node in searchResults" :key="node.id">
                        <div class="px-4 py-2.5 text-sm cursor-pointer border-b border-base-200 last:border-0 hover:bg-base-200 hover:text-primary font-medium transition-colors"
                             @click="selectSearchResult(node)">
                            <span x-text="node.label + ' (' + node.id + ')'"></span>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- 그래프 + 마크다운 뷰어 -->
        <div class="flex flex-1 overflow-hidden relative">
            <div id="cy"></div>

            <!-- 수정 모드 힌트 바 -->
            <div class="absolute bottom-5 left-1/2 -translate-x-1/2 z-40 flex flex-col items-center gap-2"
                 x-show="isEditMode" x-cloak>
                <div class="bg-neutral/80 text-neutral-content text-xs px-4 py-2 rounded-full shadow flex items-center gap-3"
                     x-show="connectingFrom === null">
                    <span>더블클릭 → 노드 추가</span>
                    <span class="opacity-40">|</span>
                    <span>노드 클릭 → 연결 시작</span>
                </div>
                <div class="bg-warning text-warning-content text-xs px-4 py-2 rounded-full shadow flex items-center gap-2"
                     x-show="connectingFrom !== null">
                    <span class="w-1.5 h-1.5 rounded-full bg-warning-content animate-pulse inline-block"></span>
                    대상 노드를 클릭하여 연결
                    <button class="underline ml-1 opacity-70 hover:opacity-100" @click="cancelConnecting()">취소</button>
                </div>
            </div>

            <!-- 인라인 노드 편집기 (더블클릭으로 생성) -->
            <div class="absolute z-50 bg-base-100 shadow-xl rounded-2xl border border-base-200 p-3 w-48"
                 x-show="inlineEditor.visible"
                 x-cloak
                 :style="`left: ${inlineEditor.x}px; top: ${inlineEditor.y}px; transform: translate(-50%, calc(-100% - 14px))`">
                <p class="text-xs text-base-content/40 mb-1.5 font-medium">새 노드</p>
                <input type="text"
                       class="input input-bordered input-xs w-full mb-2"
                       placeholder="이름 입력..."
                       x-model="inlineEditor.label"
                       x-ref="inlineEditorInput"
                       @keydown.enter="confirmInlineEditor()"
                       @keydown.escape="cancelInlineEditor()">
                <div class="flex gap-1">
                    <button class="btn btn-neutral btn-xs flex-1" @click="confirmInlineEditor()">추가</button>
                    <button class="btn btn-ghost btn-xs btn-square" @click="cancelInlineEditor()">✕</button>
                </div>
                <!-- 말풍선 꼬리 -->
                <div class="absolute left-1/2 -translate-x-1/2 -bottom-2 w-3 h-3 bg-base-100 border-r border-b border-base-200 rotate-45"></div>
            </div>

            <!-- 마크다운 뷰어 -->
            <div class="w-80 bg-base-100 border-l border-base-200 flex flex-col shrink-0 overflow-hidden"
                 x-show="viewerOpen" x-cloak>

                <!-- 뷰어 헤더 -->
                <div class="flex items-center justify-between px-4 py-3 border-b border-base-200 shrink-0 gap-2">
                    <h3 class="font-bold text-sm truncate flex-1" x-text="viewerNodeLabel"></h3>
                    <button class="btn btn-ghost btn-xs shrink-0"
                            :class="viewerEditMode ? 'btn-neutral text-neutral-content' : ''"
                            x-text="viewerEditMode ? '미리보기' : '편집'"
                            @click="toggleViewerEdit()"></button>
                    <button class="btn btn-ghost btn-xs btn-square shrink-0" @click="viewerOpen = false">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <!-- 뷰 모드 -->
                <div class="flex-1 overflow-y-auto" x-show="!viewerEditMode">
                    <div class="flex flex-col items-center justify-center h-full gap-3 text-base-content/30"
                         x-show="!viewerContent.trim()">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <p class="text-xs text-center px-6">아직 내용이 없습니다.<br>편집 버튼을 눌러 마크다운을 작성하세요.</p>
                        <button class="btn btn-ghost btn-xs" @click="toggleViewerEdit()">편집 시작</button>
                    </div>
                    <div class="p-4 markdown-content text-sm"
                         x-show="viewerContent.trim()"
                         x-html="renderMarkdown(viewerContent)"></div>
                </div>

                <!-- 편집 모드 -->
                <div class="flex flex-col flex-1 overflow-hidden" x-show="viewerEditMode">
                    <textarea class="flex-1 p-4 text-sm font-mono resize-none outline-none bg-base-50 leading-relaxed"
                              placeholder="# 제목&#10;&#10;마크다운을 입력하세요..."
                              x-model="viewerEditContent"
                              x-ref="markdownTextarea"></textarea>
                    <div class="flex gap-2 p-3 border-t border-base-200 shrink-0">
                        <button class="btn btn-neutral btn-sm flex-1" @click="saveViewerContent()">저장</button>
                        <button class="btn btn-ghost btn-sm" @click="toggleViewerEdit()">취소</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
