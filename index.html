<html>
<head>
    <title>Seomal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-80887304-4"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }

        gtag('js', new Date());
        gtag('config', 'UA-80887304-4');
    </script>
<link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300" rel="stylesheet">
    <script src="https://cdn.polyfill.io/v2/polyfill.min.js?features=Promise,fetch"></script>
    <script src="./cytoscape.3.13.0.min.js"></script>
    <script src="./cytoscape-cose-bilkent.4.0.0.js"></script>
    <script src="lib/TinyColor-1.0.0/tinycolor.js"></script>
    <script
            src="https://code.jquery.com/jquery-2.2.4.min.js"
            integrity="sha256-BbhdlvQf/xTY9gja0Dq3HiwQF8LaCRTXxZKRutelT44="
            crossorigin="anonymous"></script>
</head>
<body>
<!--<textarea id="msg" style="width:100%; height:200px;"></textarea>-->
<div id="mode-toggle-container">
    <label class="switch">
        <input type="checkbox" id="mode-toggle">
        <span class="slider round"></span>
    </label>
    <span id="mode-label">뷰어 모드</span>
</div>
<div id="search-container">
    <input type="text" id="node-search" placeholder="노드 검색 (이름 또는 ID)..." autocomplete="off">
    <div id="search-results"></div>
</div>
<div id="add-node-panel">
    <h3>새 노드 추가</h3>
    <div class="click-mode-selector">
        <strong>그래프에서 클릭하여 선택:</strong>
        <div class="segment-control" id="click-mode-group">
            <button type="button" class="segment-btn active" data-value="none">일반</button>
            <button type="button" class="segment-btn target-btn" data-value="target">선행(파랑)</button>
            <button type="button" class="segment-btn source-btn" data-value="source">후행(빨강)</button>
        </div>
    </div>
    <div class="input-group">
        <label for="node-id">ID (필수)</label>
        <input type="text" id="node-id" placeholder="예: NEW_NODE" required>
    </div>
    <div class="input-group">
        <label for="node-label">이름 (Label)</label>
        <input type="text" id="node-label" placeholder="예: 새로운 과목">
    </div>
    <div class="input-group">
        <label for="node-url">URL (선택)</label>
        <input type="text" id="node-url" placeholder="https://...">
    </div>
    <div class="input-group">
        <label>선행 노드 (이 노드를 위해 먼저 배워야 할 것)</label>
        <div id="selected-targets" class="selected-nodes-container">선택된 노드가 없습니다.</div>
    </div>
    <div class="input-group">
        <label>후행 노드 (이 노드를 배운 후 배울 수 있는 것)</label>
        <div id="selected-sources" class="selected-nodes-container">선택된 노드가 없습니다.</div>
    </div>
    <button id="add-node-btn">노드 추가하기</button>
</div>
<div id="cy"></div>
<script src="js/main.js"></script>

</body>
</html>
