<html data-theme="light">
<head>
    <title>Seomal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-80887304-4"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'UA-80887304-4');
    </script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['"Open Sans Condensed"', 'sans-serif'] } } }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300" rel="stylesheet">
    <script src="https://cdn.polyfill.io/v2/polyfill.min.js?features=Promise,fetch"></script>
    <script src="./cytoscape.3.13.0.min.js"></script>
    <script src="./cytoscape-cose-bilkent.4.0.0.js"></script>
    <script src="lib/TinyColor-1.0.0/tinycolor.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/main.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="overflow-hidden">

<div class="drawer h-screen" x-data="appState()">
    <input id="sidebar-toggle" type="checkbox" class="drawer-toggle" x-model="sidebarOpen">

    <!-- ── 메인 콘텐츠 ─────────────────────────────────────────────────── -->
    <div class="drawer-content flex flex-col h-screen overflow-hidden">

        <!-- 상단 네비바 -->
        <div class="navbar bg-base-100 border-b border-base-200 min-h-12 h-12 px-3 shrink-0 gap-2">
            <label for="sidebar-toggle" class="btn btn-ghost btn-sm btn-square">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </label>
            <span class="font-bold text-sm truncate max-w-xs" x-text="currentGraphName || 'Seomal'"></span>
            <div class="flex-1"></div>
            <!-- 검색 -->
            <div class="relative" @click.outside="searchResults = []">
                <input type="text"
                       class="input input-bordered input-xs rounded-full w-44 focus:outline-none focus:border-neutral"
                       placeholder="노드 검색..."
                       autocomplete="off"
                       x-model="searchQuery"
                       @keyup="handleSearch()">
                <div class="absolute right-0 top-8 w-64 bg-base-100 rounded-xl shadow-lg border border-base-200 max-h-52 overflow-y-auto z-50"
                     x-show="searchResults.length > 0">
                    <template x-for="node in searchResults" :key="node.id">
                        <div class="px-4 py-2.5 text-sm cursor-pointer border-b border-base-200 last:border-0 hover:bg-base-200 hover:text-primary font-medium transition-colors"
                             @click="selectSearchResult(node)">
                            <span x-text="node.label + ' (' + node.id + ')'"></span>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- 그래프 + 마크다운 뷰어 -->
        <div class="flex flex-1 overflow-hidden relative">
            <div id="cy"></div>

            <!-- 마크다운 뷰어 -->
            <div class="w-80 bg-base-100 border-l border-base-200 flex flex-col shrink-0 overflow-hidden"
                 x-show="viewerOpen" x-cloak>
                <div class="flex items-center justify-between px-4 py-3 border-b border-base-200 shrink-0">
                    <h3 class="font-bold text-sm truncate" x-text="viewerNodeLabel"></h3>
                    <button class="btn btn-ghost btn-xs btn-square ml-2 shrink-0" @click="viewerOpen = false">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="flex-1 overflow-y-auto p-4 markdown-content text-sm"
                     x-html="renderMarkdown(viewerContent)"></div>
            </div>

            <!-- 수정 모드 패널 -->
            <div class="card bg-base-100 shadow-xl absolute top-4 right-4 z-50 w-64 border border-base-200"
                 x-show="isEditMode" x-cloak>
                <div class="card-body p-4 gap-3">
                    <h3 class="card-title text-base">새 노드 추가</h3>

                    <div>
                        <p class="text-xs font-semibold text-base-content/50 mb-2">그래프에서 클릭하여 선택:</p>
                        <div class="join w-full">
                            <button type="button" class="join-item btn btn-xs flex-1"
                                    :class="clickMode === 'none'   ? 'btn-neutral' : ''"
                                    @click="clickMode = 'none'">일반</button>
                            <button type="button" class="join-item btn btn-xs flex-1"
                                    :class="clickMode === 'target' ? 'btn-info'    : ''"
                                    @click="clickMode = 'target'">선행</button>
                            <button type="button" class="join-item btn btn-xs flex-1"
                                    :class="clickMode === 'source' ? 'btn-error'   : ''"
                                    @click="clickMode = 'source'">후행</button>
                        </div>
                    </div>

                    <label class="form-control w-full">
                        <div class="label py-0.5"><span class="label-text text-xs">ID (필수)</span></div>
                        <input type="text" class="input input-bordered input-xs w-full"
                               placeholder="예: NEW_NODE" x-model="newNode.id">
                    </label>
                    <label class="form-control w-full">
                        <div class="label py-0.5"><span class="label-text text-xs">이름 (Label)</span></div>
                        <input type="text" class="input input-bordered input-xs w-full"
                               placeholder="예: 새로운 과목" x-model="newNode.label">
                    </label>
                    <label class="form-control w-full">
                        <div class="label py-0.5"><span class="label-text text-xs">URL (선택)</span></div>
                        <input type="text" class="input input-bordered input-xs w-full"
                               placeholder="https://..." x-model="newNode.url">
                    </label>

                    <div>
                        <p class="text-xs font-semibold text-base-content/50 mb-1.5">선행 노드</p>
                        <div class="min-h-8 p-2 rounded-lg border border-dashed border-base-300 bg-base-200/40 flex flex-wrap gap-1.5">
                            <template x-for="node in selectedTargets" :key="node.id">
                                <div class="badge badge-outline badge-info gap-1">
                                    <span x-text="node.label"></span>
                                    <button class="font-bold opacity-60 hover:opacity-100 leading-none" @click="removeTarget(node.id)">×</button>
                                </div>
                            </template>
                            <span class="text-xs text-base-content/30" x-show="selectedTargets.length === 0">선택된 노드가 없습니다.</span>
                        </div>
                    </div>
                    <div>
                        <p class="text-xs font-semibold text-base-content/50 mb-1.5">후행 노드</p>
                        <div class="min-h-8 p-2 rounded-lg border border-dashed border-base-300 bg-base-200/40 flex flex-wrap gap-1.5">
                            <template x-for="node in selectedSources" :key="node.id">
                                <div class="badge badge-outline badge-error gap-1">
                                    <span x-text="node.label"></span>
                                    <button class="font-bold opacity-60 hover:opacity-100 leading-none" @click="removeSource(node.id)">×</button>
                                </div>
                            </template>
                            <span class="text-xs text-base-content/30" x-show="selectedSources.length === 0">선택된 노드가 없습니다.</span>
                        </div>
                    </div>

                    <button class="btn btn-neutral btn-sm w-full" @click="addNode()">노드 추가하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── 사이드바 ────────────────────────────────────────────────────── -->
    <div class="drawer-side z-40">
        <label for="sidebar-toggle" class="drawer-overlay"></label>
        <aside class="w-60 bg-base-100 flex flex-col h-screen border-r border-base-200">

            <!-- 헤더 -->
            <div class="flex items-center justify-between px-4 py-3 border-b border-base-200 shrink-0">
                <span class="font-bold text-base">Seomal</span>
                <label for="sidebar-toggle" class="btn btn-ghost btn-xs btn-square">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </label>
            </div>

            <!-- 그래프 목록 -->
            <ul class="menu flex-1 overflow-y-auto p-2 gap-0.5">
                <template x-for="graph in graphs" :key="graph.id">
                    <li class="group">
                        <a class="justify-between pr-1"
                           :class="{'active': graph.id === currentGraphId}"
                           @click="switchGraph(graph.id)">
                            <span class="truncate text-sm" x-text="graph.name"></span>
                            <button class="btn btn-ghost btn-xs btn-square shrink-0 opacity-0 group-hover:opacity-50 hover:!opacity-100"
                                    @click.stop="deleteGraph(graph.id)">×</button>
                        </a>
                    </li>
                </template>
                <li x-show="graphs.length === 0">
                    <span class="text-xs text-base-content/40 cursor-default hover:bg-transparent">그래프가 없습니다.</span>
                </li>
            </ul>

            <!-- 새 그래프 -->
            <div class="p-3 border-t border-base-200 shrink-0">
                <div x-show="!showNewGraphInput">
                    <button class="btn btn-ghost btn-sm w-full justify-start gap-2"
                            @click="showNewGraph()">
                        <span class="text-base leading-none font-light">+</span> 새 그래프
                    </button>
                </div>
                <div class="flex gap-1.5" x-show="showNewGraphInput">
                    <input type="text"
                           class="input input-bordered input-xs flex-1"
                           placeholder="그래프 이름"
                           x-model="newGraphName"
                           x-ref="newGraphInput"
                           @keyup.enter="createGraph()"
                           @keyup.escape="cancelNewGraph()">
                    <button class="btn btn-neutral btn-xs" @click="createGraph()">추가</button>
                </div>
            </div>

            <!-- 모드 토글 -->
            <div class="px-4 py-3 border-t border-base-200 flex items-center gap-3 shrink-0">
                <input type="checkbox" class="toggle toggle-sm toggle-neutral" x-model="isEditMode">
                <span class="text-sm font-medium" x-text="isEditMode ? '수정 모드' : '뷰어 모드'"></span>
            </div>
        </aside>
    </div>
</div>

</body>
</html>
