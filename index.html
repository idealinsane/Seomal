<html>
<head>
    <title>Seomal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-80887304-4"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'UA-80887304-4');
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300" rel="stylesheet">
    <script src="https://cdn.polyfill.io/v2/polyfill.min.js?features=Promise,fetch"></script>
    <script src="./cytoscape.3.13.0.min.js"></script>
    <script src="./cytoscape-cose-bilkent.4.0.0.js"></script>
    <script src="lib/TinyColor-1.0.0/tinycolor.js"></script>
    <script src="js/main.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="appState()">
<div id="mode-toggle-container">
    <label class="switch">
        <input type="checkbox" x-model="isEditMode">
        <span class="slider round"></span>
    </label>
    <span id="mode-label" x-text="isEditMode ? '수정 모드' : '뷰어 모드'"></span>
</div>
<div id="search-container" @click.outside="searchResults = []">
    <input type="text" id="node-search" placeholder="노드 검색 (이름 또는 ID)..." autocomplete="off"
           x-model="searchQuery" @keyup="handleSearch()">
    <div id="search-results" x-show="searchResults.length > 0">
        <template x-for="node in searchResults" :key="node.id">
            <div class="search-item" @click="selectSearchResult(node)">
                <span x-text="node.label + ' (' + node.id + ')'"></span>
            </div>
        </template>
    </div>
</div>
<div id="add-node-panel" x-show="isEditMode">
    <h3>새 노드 추가</h3>
    <div class="click-mode-selector">
        <strong>그래프에서 클릭하여 선택:</strong>
        <div class="segment-control">
            <button type="button" class="segment-btn" :class="{'active': clickMode === 'none'}" @click="clickMode = 'none'">일반</button>
            <button type="button" class="segment-btn target-btn" :class="{'active': clickMode === 'target'}" @click="clickMode = 'target'">선행(파랑)</button>
            <button type="button" class="segment-btn source-btn" :class="{'active': clickMode === 'source'}" @click="clickMode = 'source'">후행(빨강)</button>
        </div>
    </div>
    <div class="input-group">
        <label for="node-id">ID (필수)</label>
        <input type="text" id="node-id" placeholder="예: NEW_NODE" x-model="newNode.id" required>
    </div>
    <div class="input-group">
        <label for="node-label">이름 (Label)</label>
        <input type="text" id="node-label" placeholder="예: 새로운 과목" x-model="newNode.label">
    </div>
    <div class="input-group">
        <label for="node-url">URL (선택)</label>
        <input type="text" id="node-url" placeholder="https://..." x-model="newNode.url">
    </div>
    <div class="input-group">
        <label>선행 노드 (이 노드를 위해 먼저 배워야 할 것)</label>
        <div class="selected-nodes-container">
            <template x-for="node in selectedTargets" :key="node.id">
                <div class="node-badge target-badge">
                    <span x-text="node.label"></span>
                    <span @click="removeTarget(node.id)">×</span>
                </div>
            </template>
            <div x-show="selectedTargets.length === 0">선택된 노드가 없습니다.</div>
        </div>
    </div>
    <div class="input-group">
        <label>후행 노드 (이 노드를 배운 후 배울 수 있는 것)</label>
        <div class="selected-nodes-container">
            <template x-for="node in selectedSources" :key="node.id">
                <div class="node-badge source-badge">
                    <span x-text="node.label"></span>
                    <span @click="removeSource(node.id)">×</span>
                </div>
            </template>
            <div x-show="selectedSources.length === 0">선택된 노드가 없습니다.</div>
        </div>
    </div>
    <button id="add-node-btn" @click="addNode()">노드 추가하기</button>
</div>
<div id="cy"></div>
</body>
</html>
